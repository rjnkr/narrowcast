<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidalis Narrowcast</title>
  <style>
    @font-face { font-family: "Roobert"; src: url("/assets/fonts/Roobert-Regular.woff2") format("woff2"), url("/assets/fonts/Roobert-Regular.woff") format("woff"); font-weight: 400; font-style: normal; }
    @font-face { font-family: "Roobert"; src: url("/assets/fonts/Roobert-Medium.woff2") format("woff2"), url("/assets/fonts/Roobert-Medium.woff") format("woff"); font-weight: 500; font-style: normal; }
    @font-face { font-family: "Roobert"; src: url("/assets/fonts/Roobert-SemiBold.woff2") format("woff2"), url("/assets/fonts/Roobert-SemiBold.woff") format("woff"); font-weight: 600; font-style: normal; }
    @font-face { font-family: "Roobert"; src: url("/assets/fonts/Roobert-Bold.woff2") format("woff2"), url("/assets/fonts/Roobert-Bold.woff") format("woff"); font-weight: 700; font-style: normal; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:    #ccf535;
      --dark-blue: #0e4362;
      --dark:      #071e2e;
      --header-h:  72px;
      --footer-h:  56px;
    }
    body {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--dark);
      color: #fff;
      font-family: "Roobert", "Inter", "DM Sans", sans-serif;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 0 32px;
      background: var(--dark-blue);
      border-bottom: 2px solid rgba(204,245,53,.15);
      flex-shrink: 0;
    }
    .logo img { height: 44px; object-fit: contain; }
    .logo-fallback {
      display: none;
      font-size: 28px; font-weight: 700;
      letter-spacing: 4px; color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 20px; }
    #offline-badge {
      display: none;
      background: #e05c2a; color: #fff;
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.5px; padding: 4px 12px;
      border-radius: 50px;
    }
    #offline-badge.show { display: block; }
    #clock {
      font-size: 32px; font-weight: 600;
      color: #fff; font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    /* ── Main slide area ── */
    main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Iframes */
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    .slide-frame.active { display: block; }

    /* Click zones — hidden for persistent (interactive) slides */
    .nav-zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 45%;
      z-index: 10;
      cursor: pointer;
    }
    #nav-prev { left: 0; }
    #nav-next { right: 0; }

    /* Loading dots */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .dot-loader {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-loader:nth-child(2) { animation-delay: 0.2s; }
    .dot-loader:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--footer-h);
      padding: 0 32px;
      background: var(--dark-blue);
      border-top: 2px solid rgba(204,245,53,.15);
      flex-shrink: 0;
    }
    #dots {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      max-width: 75%;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4);
      background: transparent;
      cursor: pointer; padding: 0;
      transition: background .25s, border-color .25s, transform .25s;
    }
    .dot.active {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.3);
    }
    .dot:hover:not(.active) { border-color: rgba(204,245,53,.6); }
    #counter {
      font-size: 14px; color: rgba(255,255,255,.55);
      letter-spacing: 1px; white-space: nowrap;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="/assets/tidalis-logo.svg" alt="Tidalis"
           onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block'">
      <span class="logo-fallback">TIDALIS</span>
    </div>
    <div class="header-right">
      <span id="offline-badge">OFFLINE</span>
      <div id="clock">--:--:--</div>
    </div>
  </header>

  <main id="main">
    <div id="loading">
      <div class="dot-loader"></div>
      <div class="dot-loader"></div>
      <div class="dot-loader"></div>
    </div>
    <div class="nav-zone" id="nav-prev"></div>
    <div class="nav-zone" id="nav-next"></div>
  </main>

  <footer>
    <div id="dots"></div>
    <div id="counter">—</div>
  </footer>

  <script src="/slideshow.js"></script>
</body>
</html>
