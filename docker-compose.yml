version: '3.9'

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/narrowcast-backend:latest
    restart: unless-stopped
    volumes:
      - cache:/app/cache
    env_file:
      - .env
    environment:
      - CACHE_DIR=/app/cache
      - PORT=3001

  frontend:
    image: ${DOCKERHUB_USERNAME}/narrowcast-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
