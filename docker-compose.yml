version: '3.9'

services:
  narrowcast:
    image: ${DOCKERHUB_USERNAME}/narrowcast:latest
    restart: unless-stopped
    ports:
      - "80:3001"
    volumes:
      - cache:/app/cache
    env_file:
      - .env
    environment:
      - CACHE_DIR=/app/cache
      - FRONTEND_DIR=/app/public

volumes:
  cache:
